<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover, maximum-scale=1.0">
    <title>EasyReader — Asistente de Lectura OCR</title>
    <script src="https://cdn.jsdelivr.net/npm/tesseract.js@5/dist/tesseract.min.js"></script>
    <style>
        :root {
            --bg: #0f0f14;
            --surface: #1a1a24;
            --surface-2: #222230;
            --primary: #6c5ce7;
            --primary-glow: #a29bfe;
            --accent: #00cec9;
            --text: #e8e8f0;
            --text-secondary: #b0b0c0;
            --danger: #e74c3c;
            --success: #2ecc71;
            --warning: #f39c12;
            --border: #2a2a38;
            --radius: 16px;
            --radius-sm: 10px;
            --shadow-lg: 0 20px 50px rgba(0,0,0,0.5);
            --font-sans: 'SF Pro Display','Segoe UI',system-ui,-apple-system,sans-serif;
            --transition: 0.25s cubic-bezier(0.4,0,0.2,1);
        }
        * { margin:0; padding:0; box-sizing:border-box; }
        html, body {
            height:100%; width:100%; overflow:hidden;
            font-family:var(--font-sans);
            background:var(--bg); color:var(--text);
            -webkit-tap-highlight-color:transparent;
            -webkit-font-smoothing:antialiased;
            user-select:none; -webkit-user-select:none;
            -webkit-touch-callout:none;
        }
        .app-container {
            display:flex; flex-direction:column;
            height:100%; width:100%;
            max-width:500px; margin:0 auto;
            position:relative; overflow:hidden;
            background:var(--bg);
        }
        .header {
            flex-shrink:0; display:flex;
            align-items:center; justify-content:space-between;
            padding:10px 14px;
            background:var(--surface);
            border-bottom:1px solid var(--border);
            z-index:10; gap:8px; min-height:52px; flex-wrap:wrap;
        }
        .header .logo {
            display:flex; align-items:center; gap:8px;
            font-weight:700; font-size:1rem;
            letter-spacing:-0.3px; color:#fff;
        }
        .header .logo .icon {
            width:30px; height:30px; border-radius:50%;
            background:linear-gradient(135deg,var(--primary),#4a3fcf);
            display:flex; align-items:center; justify-content:center;
            font-size:1rem; box-shadow:0 0 14px rgba(108,92,231,0.4);
        }
        .status-pill {
            font-size:0.7rem; font-weight:600;
            padding:5px 12px; border-radius:20px;
            letter-spacing:0.3px; text-transform:uppercase;
            transition:var(--transition); white-space:nowrap;
        }
        .status-pill.ready   { background:rgba(46,204,113,0.15); color:var(--success); border:1px solid rgba(46,204,113,0.3); }
        .status-pill.scanning{ background:rgba(108,92,231,0.2);  color:var(--primary-glow); border:1px solid rgba(108,92,231,0.4); animation:pulse 1.2s ease-in-out infinite; }
        .status-pill.error   { background:rgba(231,76,60,0.15);  color:var(--danger); border:1px solid rgba(231,76,60,0.3); }
        .status-pill.loading { background:rgba(243,156,18,0.15); color:var(--warning); border:1px solid rgba(243,156,18,0.3); }
        @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.55} }

        .camera-section {
            flex-shrink:0; position:relative;
            width:100%; aspect-ratio:4/3;
            background:#000; overflow:hidden;
            border-bottom:2px solid var(--border);
        }
        .camera-section video { width:100%; height:100%; object-fit:cover; display:block; }
        .camera-overlay { position:absolute; inset:0; pointer-events:none; z-index:2; }
        .focus-frame {
            position:absolute; inset:4px;
            border:2px dashed rgba(255,255,255,0.35);
            border-radius:12px; transition:var(--transition); pointer-events:none;
        }
        .focus-frame.active {
            border-color:var(--accent); border-style:solid;
            box-shadow:0 0 30px rgba(0,206,201,0.3),inset 0 0 30px rgba(0,206,201,0.06);
        }
        .scan-flash {
            position:absolute; inset:0;
            background:rgba(255,255,255,0.08); opacity:0;
            pointer-events:none; transition:opacity 0.15s ease-out; z-index:3;
        }
        .scan-flash.flash { opacity:1; transition:opacity 0s; }
        .ocr-progress-bar {
            position:absolute; bottom:0; left:0; height:3px;
            background:var(--accent); z-index:4;
            transition:width 0.3s ease; border-radius:0 2px 0 0; pointer-events:none;
        }
        .cam-float-btns {
            position:absolute; top:8px; right:8px;
            display:flex; flex-direction:column; gap:8px; z-index:5;
        }
        .cam-float-btn {
            width:36px; height:36px; border-radius:50%;
            background:rgba(0,0,0,0.55); backdrop-filter:blur(10px);
            -webkit-backdrop-filter:blur(10px);
            border:1px solid rgba(255,255,255,0.2);
            color:#fff; font-size:0.95rem; cursor:pointer;
            display:flex; align-items:center; justify-content:center;
            transition:var(--transition); -webkit-tap-highlight-color:transparent;
        }
        .cam-float-btn:active { background:rgba(255,255,255,0.2); transform:scale(0.9); }
        .cam-float-btn.torch-on {
            background:rgba(255,193,7,0.6); border-color:rgba(255,193,7,0.8);
            color:#ffc107; box-shadow:0 0 16px rgba(255,193,7,0.5);
        }

        .text-output-section {
            flex:1; display:flex; flex-direction:column;
            min-height:0; background:var(--surface); position:relative;
        }
        .text-output-header {
            flex-shrink:0; display:flex; align-items:center;
            justify-content:space-between;
            padding:10px 14px; border-bottom:1px solid var(--border);
            gap:8px; flex-wrap:wrap;
        }
        .text-output-header .label {
            font-size:0.75rem; font-weight:600;
            text-transform:uppercase; letter-spacing:0.6px; color:var(--text-secondary);
        }
        .confidence-badge {
            font-size:0.68rem; font-weight:600;
            padding:4px 10px; border-radius:12px;
            background:var(--surface-2); color:var(--accent);
            white-space:nowrap; display:flex; align-items:center; gap:4px;
        }
        .text-output-scroll {
            flex:1; overflow-y:auto; padding:10px 12px;
            -webkit-overflow-scrolling:touch; scroll-behavior:smooth; min-height:0;
        }
        .text-output-scroll::-webkit-scrollbar { width:3px; }
        .text-output-scroll::-webkit-scrollbar-track { background:transparent; }
        .text-output-scroll::-webkit-scrollbar-thumb { background:var(--border); border-radius:3px; }

        .recognized-text-block {
            background:var(--surface-2); border-radius:var(--radius-sm);
            padding:12px 14px; margin-bottom:10px;
            border-left:3px solid var(--primary);
            animation:slide-in 0.3s ease-out;
        }
        .recognized-text-block .timestamp {
            font-size:0.58rem; color:var(--text-secondary);
            letter-spacing:0.4px; margin-bottom:4px; text-transform:uppercase;
        }
        .recognized-text-block .text-content {
            font-size:0.95rem; line-height:1.55; color:var(--text);
            word-break:break-word; letter-spacing:-0.1px;
        }
        @keyframes slide-in { from{opacity:0;transform:translateY(10px)} to{opacity:1;transform:translateY(0)} }

        .empty-state {
            display:flex; flex-direction:column;
            align-items:center; justify-content:center;
            height:100%; color:var(--text-secondary);
            text-align:center; padding:20px; gap:8px;
        }
        .empty-state .empty-icon { font-size:2.8rem; opacity:0.5; }
        .empty-state p { font-size:0.8rem; line-height:1.4; }

        .controls-bar {
            flex-shrink:0; display:flex;
            align-items:center; justify-content:space-around;
            padding:8px 8px 14px; gap:6px;
            background:var(--surface); border-top:1px solid var(--border); flex-wrap:wrap;
        }
        .btn {
            display:inline-flex; align-items:center; justify-content:center;
            gap:5px; padding:10px 14px; border-radius:22px;
            font-weight:600; font-size:0.75rem; letter-spacing:-0.2px;
            border:none; cursor:pointer; transition:var(--transition);
            white-space:nowrap; -webkit-tap-highlight-color:transparent;
            min-height:38px; font-family:var(--font-sans);
            position:relative; overflow:hidden;
        }
        .btn:active { transform:scale(0.94); }
        .btn-primary { background:var(--primary); color:#fff; box-shadow:0 4px 14px rgba(108,92,231,0.35); }
        .btn-accent  { background:var(--accent); color:#000; font-weight:700; box-shadow:0 4px 14px rgba(0,206,201,0.3); }
        .btn-outline { background:transparent; color:var(--text); border:1.5px solid var(--border); }
        .btn-outline:active { background:var(--surface-2); border-color:#555; }
        .btn-small { padding:6px 10px; font-size:0.68rem; border-radius:16px; min-height:30px; gap:3px; }
        .btn:disabled { opacity:0.4; pointer-events:none; filter:grayscale(30%); }

        .interval-selector {
            display:flex; align-items:center; gap:4px;
            background:var(--surface-2); border-radius:18px; padding:3px;
        }
        .interval-option {
            padding:5px 9px; border-radius:15px; font-size:0.65rem;
            font-weight:600; cursor:pointer; transition:var(--transition);
            color:var(--text-secondary); border:none; background:transparent;
            font-family:var(--font-sans);
        }
        .interval-option.active { background:var(--primary); color:#fff; box-shadow:0 2px 8px rgba(108,92,231,0.3); }

        .toast {
            position:fixed; bottom:110px; left:50%;
            transform:translateX(-50%) translateY(20px);
            background:var(--surface-2); color:#fff;
            padding:10px 20px; border-radius:25px;
            font-size:0.75rem; font-weight:600;
            z-index:100; opacity:0; pointer-events:none;
            transition:all 0.3s cubic-bezier(0.4,0,0.2,1);
            box-shadow:var(--shadow-lg); white-space:nowrap;
            border:1px solid var(--border);
        }
        .toast.show { opacity:1; transform:translateX(-50%) translateY(0); }

        @media (max-width:380px) {
            .btn { padding:8px 10px; font-size:0.7rem; min-height:34px; }
            .btn-small { padding:5px 8px; }
            .header { padding:6px 10px; min-height:44px; }
            .header .logo { font-size:0.85rem; gap:5px; }
            .header .logo .icon { width:26px; height:26px; font-size:0.8rem; }
            .status-pill { font-size:0.6rem; padding:4px 8px; }
            .text-output-scroll { padding:8px; }
            .recognized-text-block { padding:10px; }
        }
        @media (min-width:420px) {
            .camera-section { aspect-ratio:16/10; border-radius:0 0 var(--radius) var(--radius); }
            .app-container {
                border-radius:var(--radius); margin-top:12px;
                height:calc(100% - 24px); box-shadow:var(--shadow-lg);
            }
        }
    </style>
</head>
<body>
<div class="app-container">
    <header class="header">
        <div class="logo">
            <span class="icon">📖</span>
            <span>EasyReader OCR</span>
        </div>
        <span class="status-pill ready" id="statusPill">● Listo</span>
    </header>

    <section class="camera-section" id="cameraSection">
        <video id="video" autoplay playsinline muted></video>
        <div class="camera-overlay">
            <div class="focus-frame" id="focusFrame"></div>
            <div class="scan-flash" id="scanFlash"></div>
            <div class="ocr-progress-bar" id="ocrProgressBar" style="width:0%;"></div>
        </div>
        <div class="cam-float-btns">
            <button class="cam-float-btn" id="btnTorch" title="Linterna" aria-label="Alternar linterna">🔦</button>
            <button class="cam-float-btn" id="btnSwitchCam" title="Cambiar cámara" aria-label="Cambiar cámara">🔄</button>
        </div>
    </section>

    <section class="text-output-section">
        <div class="text-output-header">
            <span class="label">📝 Texto Reconocido</span>
            <span class="confidence-badge" id="confidenceBadge" style="display:none;">
                🎯 <span id="confidenceValue">--</span>% confianza
            </span>
        </div>
        <div class="text-output-scroll" id="textOutputScroll">
            <div class="empty-state" id="emptyState">
                <span class="empty-icon">📄</span>
                <p>Enfoca un texto con la cámara.<br>Usa <strong>Escanear sección</strong> para un área<br>o <strong>Página completa</strong> para capturar todo.</p>
            </div>
        </div>
    </section>

    <div class="controls-bar" id="controlsBar">
        <button class="btn btn-primary" id="btnScanSection">📷 Sección</button>
        <button class="btn btn-accent"  id="btnScanPage">📄 Página</button>
        <button class="btn btn-accent"  id="btnToggleAuto">▶ Auto</button>
        <div class="interval-selector" id="intervalSelector" style="display:none;">
            <button class="interval-option" data-interval="2000">2s</button>
            <button class="interval-option active" data-interval="4000">4s</button>
            <button class="interval-option" data-interval="6000">6s</button>
            <button class="interval-option" data-interval="8000">8s</button>
        </div>
        <button class="btn btn-outline btn-small" id="btnSpeak">🔊 Leer</button>
        <button class="btn btn-outline btn-small" id="btnCopy">📋 Copiar</button>
        <button class="btn btn-outline btn-small" id="btnClear">🗑️</button>
    </div>
</div>
<div class="toast" id="toast"></div>

<script>
(function() {
    const video        = document.getElementById('video');
    const statusPill   = document.getElementById('statusPill');
    const focusFrame   = document.getElementById('focusFrame');
    const scanFlash    = document.getElementById('scanFlash');
    const ocrProgressBar     = document.getElementById('ocrProgressBar');
    const textOutputScroll   = document.getElementById('textOutputScroll');
    const emptyState         = document.getElementById('emptyState');
    const confidenceBadge    = document.getElementById('confidenceBadge');
    const confidenceValue    = document.getElementById('confidenceValue');
    const btnScanSection     = document.getElementById('btnScanSection');
    const btnScanPage        = document.getElementById('btnScanPage');
    const btnToggleAuto      = document.getElementById('btnToggleAuto');
    const btnSpeak           = document.getElementById('btnSpeak');
    const btnCopy            = document.getElementById('btnCopy');
    const btnClear           = document.getElementById('btnClear');
    const btnTorch           = document.getElementById('btnTorch');
    const btnSwitchCam       = document.getElementById('btnSwitchCam');
    const intervalSelector   = document.getElementById('intervalSelector');
    const toast              = document.getElementById('toast');

    let mediaStream = null, videoTrack = null;
    let currentFacingMode = 'environment';
    let torchOn = false;
    let autoScanActive = false, autoScanIntervalId = null, scanIntervalMs = 4000;
    let isScanning = false;
    let tesseractWorker = null, tesseractReady = false;
    let lastRecognizedText = '', allRecognizedTexts = [];
    let toastTimeout = null;

    function showToast(msg, dur = 2200) {
        if (toastTimeout) clearTimeout(toastTimeout);
        toast.textContent = msg;
        toast.classList.add('show');
        toastTimeout = setTimeout(() => { toast.classList.remove('show'); toastTimeout = null; }, dur);
    }
    function setStatus(state) {
        statusPill.className = 'status-pill ' + state;
        const labels = { ready:'● Listo', scanning:'◉ Escaneando...', loading:'⏳ Cargando...', error:'⚠ Error' };
        statusPill.textContent = labels[state] || state;
    }
    function triggerScanFlash() {
        scanFlash.classList.add('flash');
        requestAnimationFrame(() => requestAnimationFrame(() => scanFlash.classList.remove('flash')));
    }
    function setOcrProgress(p) { ocrProgressBar.style.width = Math.min(100, Math.max(0, p)) + '%'; }
    function updateEmptyState() { emptyState.style.display = allRecognizedTexts.length === 0 ? 'flex' : 'none'; }
    function scrollToBottom() { requestAnimationFrame(() => { textOutputScroll.scrollTop = textOutputScroll.scrollHeight; }); }
    function escapeHtml(str) { const d = document.createElement('div'); d.textContent = str; return d.innerHTML; }

    function addRecognizedTextBlock(text, confidence) {
        if (!text || !text.trim()) return;
        if (allRecognizedTexts.length > 0 && allRecognizedTexts[allRecognizedTexts.length-1].text === text.trim()) return;
        const timeStr = new Date().toLocaleTimeString('es-ES', {hour:'2-digit',minute:'2-digit',second:'2-digit'});
        const block = document.createElement('div');
        block.className = 'recognized-text-block';
        block.innerHTML = `<div class="timestamp">${timeStr}</div><div class="text-content">${escapeHtml(text.trim())}</div>`;
        textOutputScroll.appendChild(block);
        allRecognizedTexts.push({ text: text.trim(), confidence, time: timeStr });
        lastRecognizedText = text.trim();
        updateEmptyState();
        scrollToBottom();
        while (allRecognizedTexts.length > 30) {
            allRecognizedTexts.shift();
            const first = textOutputScroll.querySelector('.recognized-text-block');
            if (first) first.remove();
        }
        if (confidence != null) { confidenceBadge.style.display = 'flex'; confidenceValue.textContent = Math.round(confidence); }
    }

    async function initTesseract(lang = 'spa') {
        if (tesseractWorker) { await tesseractWorker.terminate(); tesseractWorker = null; tesseractReady = false; }
        setStatus('loading'); setOcrProgress(0);
        try {
            tesseractWorker = await Tesseract.createWorker(lang, 1, {
                logger: m => {
                    if (m.status === 'recognizing text') setOcrProgress(m.progress * 100);
                    else if (m.status.includes('loading')) setOcrProgress(m.progress ? m.progress * 60 : 15);
                }
            });
            await tesseractWorker.setParameters({ tessedit_pageseg_mode: '3', preserve_interword_spaces: '1' });
            tesseractReady = true;
            setOcrProgress(0); setStatus('ready');
            showToast('✅ Motor OCR listo (español)', 2200);
            return true;
        } catch(err) {
            console.error('Tesseract error:', err);
            setStatus('error'); setOcrProgress(0);
            showToast('❌ Error al cargar OCR. Recarga la página.', 4000);
            return false;
        }
    }

    async function startCamera(facingMode = 'environment') {
        if (mediaStream) { mediaStream.getTracks().forEach(t => t.stop()); mediaStream = null; videoTrack = null; }
        try {
            mediaStream = await navigator.mediaDevices.getUserMedia({
                video: { facingMode, width: { ideal: 1920 }, height: { ideal: 1080 } }, audio: false
            });
            video.srcObject = mediaStream;
            videoTrack = mediaStream.getVideoTracks()[0];
            currentFacingMode = facingMode;
            btnTorch.style.display = videoTrack?.getCapabilities?.()?.torch !== undefined ? 'flex' : 'none';
            await video.play();
            setStatus(tesseractReady ? 'ready' : 'loading');
            showToast(`📷 Cámara ${facingMode === 'environment' ? 'trasera' : 'frontal'} activa`, 2000);
            return true;
        } catch(err) {
            setStatus('error');
            const msgs = { NotAllowedError: '❌ Permiso de cámara denegado.', NotFoundError: '❌ No se encontró cámara.' };
            showToast(msgs[err.name] || '❌ Error de cámara: ' + err.message, 5000);
            return false;
        }
    }

    async function switchCamera() { await startCamera(currentFacingMode === 'environment' ? 'user' : 'environment'); }

    async function toggleTorch() {
        if (!videoTrack?.getCapabilities?.()?.torch) { showToast('🔦 Linterna no soportada.', 2000); return; }
        try {
            torchOn = !torchOn;
            await videoTrack.applyConstraints({ advanced: [{ torch: torchOn }] });
            btnTorch.classList.toggle('torch-on', torchOn);
            showToast(torchOn ? '🔦 Encendida' : '🔦 Apagada', 1500);
        } catch(err) { torchOn = !torchOn; btnTorch.classList.remove('torch-on'); showToast('⚠️ No se pudo controlar la linterna', 2000); }
    }

    function captureFrame(mode = 'section') {
        const canvas = document.createElement('canvas');
        const maxW = mode === 'page' ? 1920 : 800;
        let w = video.videoWidth || 640, h = video.videoHeight || 480;
        if (w > maxW) { h = Math.round(h * maxW / w); w = maxW; }
        canvas.width = w; canvas.height = h;
        const ctx = canvas.getContext('2d');
        ctx.filter = 'contrast(1.25) brightness(1.08) saturate(0)';
        ctx.drawImage(video, 0, 0, w, h);
        ctx.filter = 'none';
        return canvas;
    }

    async function performScan(mode = 'section') {
        if (isScanning) return null;
        if (!tesseractReady) { showToast('⏳ Motor OCR cargando...', 2000); return null; }
        if (!videoTrack || video.readyState < 2) { showToast('📷 Esperando cámara...', 1500); return null; }
        isScanning = true; setStatus('scanning');
        focusFrame.classList.add('active'); triggerScanFlash(); setOcrProgress(5);
        try {
            const canvas = captureFrame(mode);
            setOcrProgress(mode === 'page' ? 10 : 15);
            const result = await tesseractWorker.recognize(canvas);
            setOcrProgress(100);
            const text = result.data.text || '', confidence = result.data.confidence || 0;
            if (text.trim()) {
                addRecognizedTextBlock(text, confidence);
                showToast(`📖 Reconocido (${mode === 'page' ? 'página' : 'sección'}) · ${Math.round(confidence)}%`, 2000);
            } else {
                showToast('🔍 No se detectó texto.', 2000);
            }
            await new Promise(r => setTimeout(r, 200));
            setOcrProgress(0); focusFrame.classList.remove('active'); setStatus('ready');
            isScanning = false;
            return { text: text.trim(), confidence };
        } catch(err) {
            console.error('OCR error:', err);
            setOcrProgress(0); focusFrame.classList.remove('active'); setStatus('ready');
            isScanning = false; showToast('⚠️ Error al procesar imagen', 2500); return null;
        }
    }

    function startAutoScan() {
        if (autoScanActive) return;
        autoScanActive = true;
        btnToggleAuto.textContent = '⏸ Auto';
        btnToggleAuto.classList.replace('btn-accent', 'btn-primary');
        intervalSelector.style.display = 'flex';
        showToast('🔄 Auto-escaneo activado (cada ' + scanIntervalMs/1000 + 's)', 2500);
        performScan('section');
        autoScanIntervalId = setInterval(() => { if (!isScanning && autoScanActive) performScan('section'); }, scanIntervalMs);
    }
    function stopAutoScan() {
        autoScanActive = false;
        if (autoScanIntervalId) { clearInterval(autoScanIntervalId); autoScanIntervalId = null; }
        btnToggleAuto.textContent = '▶ Auto';
        btnToggleAuto.classList.replace('btn-primary', 'btn-accent');
        intervalSelector.style.display = 'none';
        focusFrame.classList.remove('active'); setOcrProgress(0);
        if (!isScanning) setStatus('ready');
        showToast('⏹ Auto-escaneo detenido', 2000);
    }
    function toggleAutoScan() { autoScanActive ? stopAutoScan() : startAutoScan(); }

    function setScanInterval(ms) {
        scanIntervalMs = ms;
        document.querySelectorAll('.interval-option').forEach(o => o.classList.toggle('active', parseInt(o.dataset.interval) === ms));
        if (autoScanActive) {
            clearInterval(autoScanIntervalId);
            autoScanIntervalId = setInterval(() => { if (!isScanning && autoScanActive) performScan('section'); }, scanIntervalMs);
            showToast('⏱ Intervalo: ' + ms/1000 + 's', 1800);
        }
    }

    function speakLastText() {
        if (!lastRecognizedText) { showToast('📢 No hay texto para leer.', 2500); return; }
        if (!('speechSynthesis' in window)) { showToast('🔇 Navegador sin soporte de voz.', 3000); return; }
        window.speechSynthesis.cancel();
        const u = new SpeechSynthesisUtterance(lastRecognizedText);
        u.lang = 'es-ES'; u.rate = 0.88; u.pitch = 1.0;
        const v = window.speechSynthesis.getVoices().find(v => v.lang.startsWith('es'));
        if (v) u.voice = v;
        u.onstart = () => showToast('🔊 Leyendo...', 1500);
        u.onend   = () => showToast('✅ Lectura completada', 2000);
        u.onerror = () => showToast('⚠️ Error en lectura', 2000);
        window.speechSynthesis.speak(u);
    }

    function copyAllText() {
        if (!allRecognizedTexts.length) { showToast('📋 Sin texto para copiar.', 2000); return; }
        const allText = allRecognizedTexts.map(i => `[${i.time}] ${i.text}`).join('\n\n');
        navigator.clipboard.writeText(allText)
            .then(() => showToast('📋 ¡Copiado! (' + allRecognizedTexts.length + ' fragmentos)', 2500))
            .catch(() => {
                const ta = document.createElement('textarea');
                ta.value = allText; ta.style.position = 'fixed'; ta.style.left = '-9999px';
                document.body.appendChild(ta); ta.select();
                try { document.execCommand('copy'); showToast('📋 Copiado.', 2000); }
                catch(e) { showToast('⚠️ No se pudo copiar.', 2500); }
                document.body.removeChild(ta);
            });
    }

    function clearHistory() {
        if (!allRecognizedTexts.length) { showToast('🗑️ Historial vacío.', 1500); return; }
        textOutputScroll.querySelectorAll('.recognized-text-block').forEach(b => b.remove());
        allRecognizedTexts = []; lastRecognizedText = '';
        confidenceBadge.style.display = 'none'; updateEmptyState();
        showToast('🗑️ Historial limpiado', 1800);
    }

    btnScanSection.addEventListener('click', () => { if (isScanning) { showToast('⏳ Espera...', 1500); return; } performScan('section'); });
    btnScanPage.addEventListener('click',    () => { if (isScanning) { showToast('⏳ Espera...', 1500); return; } performScan('page'); });
    btnToggleAuto.addEventListener('click',  toggleAutoScan);
    btnSpeak.addEventListener('click',       speakLastText);
    btnCopy.addEventListener('click',        copyAllText);
    btnClear.addEventListener('click',       clearHistory);
    btnTorch.addEventListener('click',       toggleTorch);
    btnSwitchCam.addEventListener('click',   switchCamera);
    intervalSelector.addEventListener('click', e => {
        const opt = e.target.closest('.interval-option');
        if (opt) { const ms = parseInt(opt.dataset.interval); if (ms && ms !== scanIntervalMs) setScanInterval(ms); }
    });
    document.addEventListener('keydown', e => {
        if (e.key === ' ' && !e.target.closest('button,input')) { e.preventDefault(); if (!isScanning) performScan('section'); }
        else if (e.key === 'a' && e.ctrlKey) { e.preventDefault(); toggleAutoScan(); }
        else if (e.key === 'l' && e.ctrlKey) { e.preventDefault(); speakLastText(); }
    });
    if ('speechSynthesis' in window) {
        window.speechSynthesis.getVoices();
        window.speechSynthesis.onvoiceschanged = () => window.speechSynthesis.getVoices();
    }
    document.addEventListener('visibilitychange', () => {
        if (document.hidden) { if (autoScanIntervalId) clearInterval(autoScanIntervalId); }
        else if (autoScanActive && !autoScanIntervalId) {
            autoScanIntervalId = setInterval(() => { if (!isScanning && autoScanActive) performScan('section'); }, scanIntervalMs);
            if (!isScanning) performScan('section');
        }
    });
    window.addEventListener('beforeunload', () => {
        if (autoScanIntervalId) clearInterval(autoScanIntervalId);
        if (mediaStream) mediaStream.getTracks().forEach(t => t.stop());
        if (tesseractWorker) tesseractWorker.terminate().catch(() => {});
        if ('speechSynthesis' in window) window.speechSynthesis.cancel();
    });

    async function init() {
        updateEmptyState(); setStatus('loading'); btnTorch.style.display = 'none';
        const [cameraOk, ocrOk] = await Promise.all([startCamera('environment'), initTesseract('spa')]);
        if (!cameraOk) { setStatus('error'); showToast('❌ Cámara no disponible.', 5000); }
        if (ocrOk && cameraOk) { setStatus('ready'); showToast('🚀 Listo. Escanea sección o página completa.', 3500); }
    }
    init().catch(err => { console.error(err); setStatus('error'); showToast('❌ Error inesperado.', 5000); });
})();
</script>
</body>
</html>
